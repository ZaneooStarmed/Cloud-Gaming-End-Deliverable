version: '3.8'

services:

  # Session orchestration API
  session-manager:
    build: ./session-manager
    container_name: cg-session-manager
    ports:
      - "3000:3000"
    volumes:
      - C:\Users\Zane\Desktop\CloudGaming\logs:/logs
      - C:\Users\Zane\Desktop\CloudGaming\scripts:/scripts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: cg-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  # Latency & performance dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: cg-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=cloudgaming
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # Reverse proxy / load balancer
  nginx:
    image: nginx:alpine
    container_name: cg-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - session-manager
    restart: unless-stopped

volumes:
  grafana-data:

