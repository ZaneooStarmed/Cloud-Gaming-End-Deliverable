worker_processes 1;

events {
    worker_connections 1024;
}

http {

    upstream session_manager {
        server session-manager:3000;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream prometheus {
        server prometheus:9090;
    }

    server {
        listen 80;

        # ── Default root redirect ────────────────────────────
        location = / {
            return 301 /dashboard/;
        }

        # ── Grafana (includes login) ─────────────────────────
        location /dashboard/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Grafana login page specifically ──────────────────
        location /login {
            proxy_pass http://grafana/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Grafana static assets ────────────────────────────
        location /public/ {
            proxy_pass http://grafana/public/;
            proxy_set_header Host $host;
        }

        location /api/live/ {
            proxy_pass http://grafana/api/live/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /api/grafana/ {
            proxy_pass http://grafana/api/;
            proxy_set_header Host $host;
        }

        # ── Session Manager API ──────────────────────────────
        location /api/session/ {
            proxy_pass http://session_manager/session/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Health check ─────────────────────────────────────
        location /health {
            proxy_pass http://session_manager/health;
        }

        # ── Status page ──────────────────────────────────────
        location = /status {
            default_type application/json;
            return 200 '{"nginx":"running","status":"ok"}';
        }

        # ── Prometheus ───────────────────────────────────────
        location /prometheus/ {
            proxy_pass http://prometheus/;
            proxy_set_header Host $host;
        }

        # ── Sunshine Web UI on host ──────────────────────────
        location /sunshine/ {
            proxy_pass https://host.docker.internal:47990/;
            proxy_ssl_verify off;
            proxy_set_header Host $host;
        }

        # ── Catch all 404s ───────────────────────────────────
        error_page 404 = @not_found;
        location @not_found {
            default_type application/json;
            return 404 '{"error":"route not found","available_routes":["/","/login","/dashboard/","/health","/status","/prometheus/","/sunshine/","/api/session/start","/api/session/stop"]}';
        }
    }
}